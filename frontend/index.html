<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HILS貸出予約ツール</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- トップバー -->
  <header class="topbar">
    <nav class="nav-tabs">
      <button class="nav-btn left-tab"  data-page="form">フォーム</button>
      <button class="nav-btn mid-tab active" data-page="view">ビュー</button>
      <button class="nav-btn right-tab" data-page="request">申請画面</button>
    </nav>
    <div class="status-area">
      <span id="status-msg" class="status-msg hidden"></span>
    </div>
    <!-- 改修: マニュアルボタン（トップバー右側・ユーザー名表示の左）PDF未配置期間はステータス欄に通知 -->
    <button id="manual-btn" class="btn btn-manual">マニュアル</button>
    <div class="user-area">
      <span id="user-name"></span>
    </div>
  </header>

  <!-- ページコンテンツ -->
  <main class="page-content">

    <!-- ビューページ（ガントチャート） -->
    <div id="page-view" class="page active">
      <div class="cal-nav">
        <button id="prev-btn"     class="btn btn-nav">◀ 前月</button>
        <span   id="month-label"  class="month-label"></span>
        <button id="next-btn"     class="btn btn-nav">次月 ▶</button>
        <button id="today-btn"    class="btn btn-today">今月</button>
        <button id="register-btn" class="btn btn-register">＋ 登録</button>
        <!-- 改修: 予約表を画像として保存するボタン（GUI版の📷保存機能に相当） -->
        <button id="capture-btn"  class="btn btn-capture">📷 保存</button>
        <!-- 改修(第4回): 西/南HILSルーム切替プルダウン（保存ボタンの右隣） -->
        <select id="room-select" class="room-select">
          <option value="west">西HILSルーム</option>
          <option value="south">南HILSルーム</option>
        </select>
        <!-- 改修: 担当者列の表示/非表示チェックボックス -->
        <label class="assignee-toggle"><input type="checkbox" id="assignee-visible-chk" checked> 担当者列</label>
      </div>
      <div class="view-body">
        <div class="gantt-wrapper">
          <table id="gantt-table" class="gantt-table">
            <thead id="gantt-head"></thead>
            <tbody id="gantt-body"></tbody>
          </table>
        </div>
        <!-- 改修: 右サイドパネル（凡例＋フォーム領域を上下2分割・モーダル廃止） -->
        <div id="side-panel" class="side-panel">
          <!-- 上段: 凡例（id不変・renderLegendPanel()の描画先） -->
          <div id="legend-panel" class="legend-panel"></div>
          <!-- フォーム未表示時のプレースホルダ -->
          <div id="form-empty" class="form-empty">予約セルをダブルクリック<br>または範囲選択して「＋登録」</div>
          <!-- 下段: 登録・編集・閲覧フォーム（旧 #dialog-overlay の中身を移設） -->
          <div id="form-pane" class="form-pane hidden">
            <div class="form-pane-header"><span id="dialog-title">予約登録</span></div>
            <div class="form-pane-body" id="dialog-body"></div>
            <div class="form-pane-footer">
              <!-- 改修(マージ): 削除ボタンをダイアログ内左側に配置（編集時のみ表示） -->
              <button id="dialog-delete-btn" class="btn btn-delete hidden">削除</button>
              <!-- 改修(マージ): キャンセル・保存は右揃え -->
              <div class="dialog-footer-right">
                <button id="dialog-cancel" class="btn btn-cancel">キャンセル</button>
                <button id="dialog-ok"     class="btn btn-ok">登録</button>
              </div>
            </div>
          </div>
          <!-- 下段: 使用期間変更申請フォーム（旧 #extend-overlay の中身を移設） -->
          <div id="extend-pane" class="form-pane hidden">
            <div class="form-pane-header"><span>使用期間変更申請</span></div>
            <div class="form-pane-body">
              <!-- 改修(第7回): 開始日入力欄を追加 -->
              <div class="form-row">
                <label>変更後開始日:</label>
                <input type="date" id="ext-start">
              </div>
              <div class="form-row">
                <label>変更後終了日:</label>
                <input type="date" id="ext-end">
              </div>
              <div class="form-row">
                <label>変更理由:</label>
                <textarea id="ext-reason" rows="3" placeholder="必須入力"></textarea>
              </div>
            </div>
            <div class="form-pane-footer">
              <!-- 改修(マージ): キャンセル・申請を右揃えラップ -->
              <div class="dialog-footer-right">
                <button id="ext-cancel" class="btn btn-cancel">キャンセル</button>
                <button id="ext-ok" class="btn btn-ok">申請</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="info-panel" class="info-panel">
        <span id="info-hint"    class="info-hint">予約をクリックすると詳細を表示します</span>
        <span id="info-machine" class="info-item hidden"></span>
        <span id="info-period"  class="info-item hidden"></span>
        <span id="info-label"     class="info-item hidden"></span>
        <span id="info-applicant" class="info-item hidden"></span><!-- 申請者表示欄（予約選択時に下部パネルへ出す） -->
        <!-- 改修(第2回): 編集ボタンを撤去（ダブルクリックによる編集ダイアログ起動に一本化） -->
        <!-- 改修(マージ): 削除ボタンを情報パネルから編集ダイアログ内へ移設。XPX受領ボタンは撤去。 -->
        <!-- 改修(第7回): 使用期間変更申請ボタン（使用者モード・予約選択時に表示。ガワのみ） -->
        <button id="info-extend-btn" class="btn btn-extend hidden">期間変更申請</button>
        <!-- 改修: 利用取消依頼ボタン（使用者モード・予約選択時に表示。送信処理は未実装） -->
        <button id="info-cancel-btn" class="btn btn-cancel-request hidden">利用取消依頼</button>
      </div>
    </div>

    <!-- フォームページ（骨組み） -->
    <div id="page-form" class="page">
      <div class="placeholder">【フォーム】開発中</div>
    </div>

    <!-- 申請画面（骨組み） -->
    <div id="page-request" class="page">
      <div class="placeholder">【申請画面】開発中</div>
    </div>

    <!-- 承知/辞退ページ（専用URL: ?page=accept で起動）使用確定通知メールのリンクから直接開く独立ページ -->
    <div id="page-accept" class="page accept-page">
      <div class="accept-container">
        <h2 class="accept-heading">使用確定のご確認</h2>

        <!-- 予約内容確認エリア -->
        <div class="accept-card">
          <h3 class="accept-card-title">予約内容</h3>
          <table class="accept-info-table">
            <tr><th>ラベル</th><td id="accept-info-label">−</td></tr>
            <tr><th>借用者</th><td id="accept-info-user">−</td></tr>
            <tr><th>使用開始日</th><td id="accept-info-start">−</td></tr>
            <tr><th>使用終了日</th><td id="accept-info-end">−</td></tr>
          </table>
        </div>

        <!-- 予約内容変更依頼フォーム（承知前に内容を変更したい場合） -->
        <div class="accept-card">
          <h3 class="accept-card-title">予約内容を変更する場合</h3>
          <p class="accept-note">変更が必要な場合は以下を入力してPMOへ変更依頼を送信してください。</p>
          <div class="form-row">
            <label>使用開始日:</label>
            <input type="date" id="accept-new-start">
          </div>
          <div class="form-row">
            <label>使用終了日:</label>
            <input type="date" id="accept-new-end">
          </div>
          <div class="form-row">
            <label>変更理由（必須）:</label>
            <textarea id="accept-change-reason" rows="3" placeholder="変更理由を入力してください"></textarea>
          </div>
          <div class="accept-card-footer">
            <button id="accept-change-btn" class="btn btn-ok">変更依頼を送信</button>
          </div>
        </div>

        <!-- 承知ブロック -->
        <div class="accept-card">
          <h3 class="accept-card-title">承知する</h3>
          <div class="form-row">
            <label>理由（任意）:</label>
            <textarea id="accept-ok-reason" rows="2" placeholder="任意入力"></textarea>
          </div>
          <div class="accept-card-footer">
            <button id="accept-ok-btn" class="btn btn-ok">承知</button>
          </div>
        </div>

        <!-- 辞退ブロック -->
        <div class="accept-card accept-card-reject">
          <h3 class="accept-card-title">辞退する</h3>
          <div class="form-row">
            <label>辞退理由（必須）:</label>
            <textarea id="accept-reject-reason" rows="2" placeholder="辞退理由を入力してください（必須）"></textarea>
          </div>
          <div class="accept-card-footer">
            <button id="accept-reject-btn" class="btn btn-delete">辞退</button>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>

<!-- 改修: 登録・編集・閲覧・期間変更申請は右サイドパネル(#form-pane/#extend-pane)へ移設。旧overlay削除 -->

<!-- 改修: html2canvasをローカル同梱（オフライン・社内網でも動作するよう） -->
<script src="html2canvas.min.js"></script>
<script src="app.js"></script>
</body>
</html>
