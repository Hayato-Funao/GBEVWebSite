<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HILS貸出予約サイト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

  <!-- ページコンテンツ -->
  <main class="page-content">

    <!-- ビューページ（ガントチャート） -->
    <div id="page-view" class="page active">
      <!-- 改修(トップバー廃止): ビュータブ削除に伴い、トップバー(header.topbar)の全要素（ステータス表示・
           マニュアル・地図・ユーザー名）を本行(cal-nav)へ移設した。トップバー削除でできる最上部の空行は無くなる -->
      <div class="cal-nav">
        <button id="prev-btn"     class="btn btn-nav">◀ 前月</button>
        <span   id="month-label"  class="month-label"></span>
        <button id="next-btn"     class="btn btn-nav">次月 ▶</button>
        <button id="today-btn"    class="btn btn-today">今月</button>
        <button id="register-btn" class="btn btn-register">＋ 登録</button>
        <!-- 改修(休日設定廃止→予約不可設定): 選択範囲（筐体×日付）を予約不可にするボタン（事務局のみ表示・非事務局はJSで隠す） -->
        <!-- 改修(色調整): 登録ボタン(緑)と同色で見分けづらかったため専用色(インディゴ)を継続使用 -->
        <button id="blockade-btn" class="btn btn-blockade">予約不可設定</button>
        <!-- 改修: スクショ機能（📷保存ボタン）は削除 -->
        <!-- 改修(第4回): 西/南HILSルーム切替プルダウン -->
        <!-- 改修: 設置場所（61号棟3F）をルーム名に併記 -->
        <select id="room-select" class="room-select">
          <option value="west">西HILSルーム（61号棟3F）</option>
          <option value="south">南HILSルーム（61号棟3F）</option>
        </select>
        <!-- 改修: 担当者列の表示/非表示チェックボックス -->
        <label class="assignee-toggle"><input type="checkbox" id="assignee-visible-chk" checked> 担当者列</label>
        <!-- 改修(トップバー廃止): 旧トップバーの要素をここへ移設（status-areaがflex:1のスペーサとなり右寄せする） -->
        <div class="status-area">
          <span id="status-msg" class="status-msg hidden"></span>
        </div>
        <button id="manual-btn" class="btn btn-manual">マニュアル</button>
        <!-- 改修: メール宛先/CC設定ボタン（事務局モードのみ表示。app.jsのisAdmin判定でhiddenを外す）
             環境変数(HILS_MAIL_PROMPT)やコンソール入力（対話起動）に依存せず、常駐運用中でも設定変更できるようにする -->
        <button id="mail-config-btn" class="btn btn-manual hidden">メール設定</button>
        <!-- 改修(地図ボタンルーム別化): 初期値は西HILSルーム。ルーム切替時はapp.jsのapplyMapUrl()がhrefを書き換える --><a id="map-btn" class="btn btn-manual" href="http://172.25.7.82:5173/map?room=%E8%A5%BFHILS%E3%83%AB%E3%83%BC%E3%83%A0" target="_blank" rel="noopener">地図</a>
        <div class="user-area">
          <span id="user-name"></span>
        </div>
      </div>
      <div class="view-body">
        <div class="gantt-wrapper">
          <table id="gantt-table" class="gantt-table">
            <thead id="gantt-head"></thead>
            <tbody id="gantt-body"></tbody>
          </table>
        </div>
        <!-- 改修: サイドパネルのドラッグリサイズ用ハンドル（ガント表とサイドパネルの間） -->
        <div id="side-panel-resizer" class="side-panel-resizer"></div>
        <!-- 改修: 右サイドパネル（凡例＋フォーム領域を上下2分割・モーダル廃止） -->
        <div id="side-panel" class="side-panel">
          <!-- 上段: 凡例（id不変・renderLegendPanel()の描画先） -->
          <div id="legend-panel" class="legend-panel"></div>
          <!-- フォーム未表示時のプレースホルダ -->
          <div id="form-empty" class="form-empty">予約セルをダブルクリック<br>または範囲選択して「＋登録」</div>
          <!-- 下段: 登録・編集・閲覧フォーム（旧 #dialog-overlay の中身を移設） -->
          <div id="form-pane" class="form-pane hidden">
            <div class="form-pane-header"><span id="dialog-title">予約登録</span></div>
            <div class="form-pane-body" id="dialog-body"></div>
            <div class="form-pane-footer">
              <!-- 改修(マージ): 削除ボタンをダイアログ内左側に配置（編集時のみ表示） -->
              <button id="dialog-delete-btn" class="btn btn-delete hidden">削除</button>
              <!-- 改修: 利用終了ボタン（事務局モード・編集時のみ表示。ステータス更新処理は未実装） -->
              <button id="dialog-terminate-btn" class="btn btn-terminate hidden">利用終了</button>
              <!-- 改修(マージ): キャンセル・保存は右揃え -->
              <div class="dialog-footer-right">
                <button id="dialog-cancel" class="btn btn-cancel">キャンセル</button>
                <button id="dialog-ok"     class="btn btn-ok">登録</button>
              </div>
            </div>
          </div>
          <!-- 下段: 使用期間変更申請フォーム（旧 #extend-overlay の中身を移設） -->
          <div id="extend-pane" class="form-pane hidden">
            <div class="form-pane-header"><span>使用期間変更申請</span></div>
            <div class="form-pane-body">
              <!-- 改修(第7回): 開始日入力欄を追加 -->
              <div class="form-row">
                <label>変更後開始日:</label>
                <input type="date" id="ext-start">
              </div>
              <div class="form-row">
                <label>変更後終了日:</label>
                <input type="date" id="ext-end">
              </div>
              <div class="form-row">
                <label>変更理由:</label>
                <textarea id="ext-reason" rows="3" placeholder="必須入力"></textarea>
              </div>
            </div>
            <div class="form-pane-footer">
              <!-- 改修(マージ): キャンセル・申請を右揃えラップ -->
              <div class="dialog-footer-right">
                <button id="ext-cancel" class="btn btn-cancel">キャンセル</button>
                <button id="ext-ok" class="btn btn-ok">申請</button>
              </div>
            </div>
          </div>
          <!-- 改修: 利用取消依頼フォーム（期間変更申請と同様に取消理由を残す） -->
          <div id="cancel-pane" class="form-pane hidden">
            <div class="form-pane-header"><span>利用取消依頼</span></div>
            <div class="form-pane-body">
              <div class="form-row">
                <label>取消理由:</label>
                <textarea id="cancel-reason" rows="3" placeholder="必須入力"></textarea>
              </div>
            </div>
            <div class="form-pane-footer">
              <div class="dialog-footer-right">
                <button id="cancel-cancel" class="btn btn-cancel">キャンセル</button>
                <button id="cancel-ok" class="btn btn-ok">依頼</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="info-panel" class="info-panel">
        <!-- 改修: コメント入力案内文言へ変更（赤字化はstyle.css .info-hintで対応） -->
        <span id="info-hint"    class="info-hint">セルを右クリックするとコメントを入力できます</span>
        <span id="info-machine" class="info-item hidden"></span>
        <span id="info-period"  class="info-item hidden"></span>
        <span id="info-label"     class="info-item hidden"></span>
        <span id="info-applicant" class="info-item hidden"></span><!-- 申請者表示欄（予約選択時に下部パネルへ出す） -->
        <!-- 改修(第2回): 編集ボタンを撤去（ダブルクリックによる編集ダイアログ起動に一本化） -->
        <!-- 改修(マージ): 削除ボタンを情報パネルから編集ダイアログ内へ移設。XPX受領ボタンは撤去。 -->
        <!-- 改修(第7回): 使用期間変更申請ボタン（使用者モード・予約選択時に表示。ガワのみ） -->
        <button id="info-extend-btn" class="btn btn-extend hidden">期間変更申請</button>
        <!-- 改修: 利用取消依頼ボタン（使用者モード・予約選択時に表示。送信処理は未実装） -->
        <button id="info-cancel-btn" class="btn btn-cancel-request hidden">利用取消依頼</button>
        <!-- 改修: 利用終了報告ボタン（使用者モード・予約選択時に表示。送信処理は未実装） -->
        <button id="info-report-btn" class="btn btn-report hidden">利用終了報告</button>
      </div>
    </div>

    <!-- 改修: フォームページ・申請画面（骨組みのみで未実装）は削除 -->

    <!-- 承知/辞退ページ（専用URL: ?page=accept で起動）使用確定通知メールのリンクから直接開く独立ページ -->
    <div id="page-accept" class="page accept-page">
      <div class="accept-container">
        <h2 class="accept-heading">使用確定のご確認</h2>

        <!-- 予約内容確認エリア -->
        <div class="accept-card">
          <h3 class="accept-card-title">予約内容</h3>
          <!-- 改修(複数行予約表示調整): 使用開始日/使用終了日は複数行予約でも共通のため単一セル、
               機種名のみ複数予約分を列挙する（#accept-info-machinesにrenderAcceptInfo()が行を差し込む） -->
          <table class="accept-info-table">
            <!-- 改修: 表記統一のため「機種名」→「環境名」に変更 -->
            <tr><th>環境名</th><td><div id="accept-info-machines">−</div></td></tr>
            <tr><th>使用開始日</th><td id="accept-info-start">−</td></tr>
            <tr><th>使用終了日</th><td id="accept-info-end">−</td></tr>
          </table>
        </div>

        <!-- 改修(プルダウン化): 承知/辞退/期間変更の3ボタン構成をプルダウン＋単一送信ボタンへ統合。
             内部値・メール文面・SP列更新（承知/辞退/期間変更）は既存のまま。初期選択は「承知」 -->
        <div class="accept-card">
          <h3 class="accept-card-title">対応を選択してください</h3>
          <div class="form-row">
            <label>対応:</label>
            <select id="accept-action">
              <option value="承知" selected>承知する</option>
              <option value="辞退">辞退する</option>
              <option value="期間変更">予約内容を変更する</option>
            </select>
          </div>

          <!-- 承知時の入力欄（初期表示） -->
          <!-- 改修: 承知時は理由記述欄が不要のため削除。注意文（利用終了報告の周知）は維持 -->
          <div id="accept-action-ok" class="accept-action-body">
            <!-- 改修: 利用終了時の対応事項（利用終了報告ボタン押下・初期状態復帰確認）を承知前に周知 -->
            <p class="accept-note accept-warning">
              利用終了時には、使用者が利用終了報告ボタンを押下して、事務局に報告してください。<br>
              ※HILSの初期状態復帰が確認できない場合、処理依頼、または次回以降の貸出しを禁止することがあります。
            </p>
          </div>

          <!-- 辞退時の入力欄 -->
          <div id="accept-action-reject" class="accept-action-body hidden">
            <div class="form-row">
              <label>辞退理由（必須）:</label>
              <textarea id="accept-reject-reason" rows="2" placeholder="辞退理由を入力してください（必須）"></textarea>
            </div>
          </div>

          <!-- 期間変更時の入力欄 -->
          <div id="accept-action-change" class="accept-action-body hidden">
            <p class="accept-note">変更が必要な場合は以下を入力して事務局へ変更依頼を送信してください。</p>
            <div class="form-row">
              <label>使用開始日:</label>
              <input type="date" id="accept-new-start">
            </div>
            <div class="form-row">
              <label>使用終了日:</label>
              <input type="date" id="accept-new-end">
            </div>
            <div class="form-row">
              <label>変更理由（必須）:</label>
              <textarea id="accept-change-reason" rows="3" placeholder="変更理由を入力してください"></textarea>
            </div>
          </div>

          <div class="accept-card-footer">
            <button id="accept-submit-btn" class="btn btn-ok">送信</button>
          </div>
        </div>

      </div>
    </div>

  </main>
</div>

<!-- 改修: 登録・編集・閲覧・期間変更申請は右サイドパネル(#form-pane/#extend-pane)へ移設。旧overlay削除 -->

<!-- 改修: 処理中オーバーレイ（メール送信・ステータス変更中は操作をブロックして表示） -->
<div id="busy-overlay" class="busy-overlay hidden">
  <div class="busy-box">
    <div class="busy-spinner"></div>
    <div class="busy-text">処理中...</div>
  </div>
</div>

<!-- 改修: メール宛先/CC設定モーダル（事務局モードのみ。mail-config-btn押下で表示）
     環境変数・コンソール入力なしで backend/mail_config.json を更新できるようにするための画面 -->
<div id="mail-config-overlay" class="busy-overlay hidden">
  <div class="mail-config-box">
    <h3 class="mail-config-title">メール宛先/CC設定</h3>
    <div class="form-row">
      <label>事務局宛先(To):</label>
      <input type="text" id="mail-cfg-pmoTo" placeholder="複数可・カンマ区切り／空欄で現状維持">
    </div>
    <div class="form-row">
      <label>事務局宛CC:</label>
      <input type="text" id="mail-cfg-pmoCc" placeholder="複数可・カンマ区切り／空欄でCCなし">
    </div>
    <div class="form-row">
      <label>ユーザー宛CC:</label>
      <input type="text" id="mail-cfg-userCc" placeholder="複数可・カンマ区切り／空欄でCCなし">
    </div>
    <div class="form-row">
      <label>アラートCC:</label>
      <input type="text" id="mail-cfg-alertCc" placeholder="複数可・カンマ区切り／空欄でCCなし">
    </div>
    <div class="dialog-footer-right">
      <button id="mail-cfg-cancel" class="btn btn-cancel">キャンセル</button>
      <button id="mail-cfg-save"   class="btn btn-ok">保存</button>
    </div>
  </div>
</div>

<!-- 改修: スクショ機能削除に伴いhtml2canvas読込を削除 -->
<script src="app.js"></script>
</body>
</html>
